# Configuración Global del Agente
[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf-docker"
  debug = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.137.28:1883"]

  topics = ["v3/my-primer-aplicacion/devices/+/up"] # server Dami
  
  username = "my-primer-aplicacion" # server Dami

  password = "NNSXS.WDOEXRBQ7VXZWAELYF4PO4YE7VIGJZKPLJYOOSA.77KM3ZWFFZ32DTHMD4QKNHMGVZ4DGWIX4HWWPXT4AQ3FSDFHYULA" # server Dami
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    # (Opcional) Si quieres usar el device_id como etiqueta (tag) para diferenciar dispositivos
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "end_device_ids.device_id"
      rename = "device_id"

#    [[inputs.mqtt_consumer.json_v2.field]]
#      path = "uplink_message.decoded_payload.temperature_1"   # el path del JSON
#      rename = "temperature_1" # El nombre con el que se guardará en la DB
#      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.settings.frequency"
      rename = "frequency"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.settings.timestamp"
      rename = "timestamp"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.settings.data_rate.lora.bandwidth"
      rename = "bandwidth"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.settings.data_rate.lora.spreading_factor"
      rename = "spreading_factor"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.settings.data_rate.lora.coding_rate"
      rename = "coding_rate"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.rx_metadata.0.rssi"
      rename = "rssi"
      type = "int"
      optional = true  # IMPORTANTE: Evita errores si falta metadata

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.rx_metadata.0.snr"
      rename = "snr"
      type = "float"
      optional = true  # IMPORTANTE: Evita errores si falta metadata

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.rx_metadata.0.channel_index"
      rename = "channel_index"
      type = "int"
      optional = true  # IMPORTANTE: Evita errores si falta metadata

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.f_cnt"
      rename = "f_cnt"
      type = "int"
      optional = true  # IMPORTANTE: Evita errores si falta metadata

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.frm_payload"
      rename = "payload_crudo"
      type = "string"
      optional = true  # IMPORTANTE: Evita errores si falta metadata

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uplink_message.consumed_airtime"
      rename = "consumed_airtime"
      type = "string"   # Luego el processor elimina la "s" al final

  [[processors.regex]]
    namepass = ["mqtt_consumer"] # Solo se aplica a los datos que vienen del MQTT

    [[processors.regex.fields]]
      # Primero nos aseguramos de que el campo sea tratado como string para limpiar
      key = "consumed_airtime"
      pattern = "([0-9.]+)s"
      replacement = "${1}"

  [[processors.converter]]
    # Después de limpiar la "s", lo convertimos a float
    [processors.converter.fields]
      float = ["consumed_airtime"]

  [[processors.strings]]
    namepass = ["mqtt_consumer"]

  [[processors.strings.base64decode]]
    field = "payload_crudo"      # El nombre del campo que capturaste arriba
    dest = "payload_decodificado" # (Opcional) Crea un nuevo campo con el resultado decodificado

[[outputs.influxdb_v2]]
  # URL interna del docker
  urls = ["http://influxdb:8086"]

  # El token definido en el docker-compose
  token = "mi-super-token-seguro-unrc"

  # Organización y Bucket solicitados
  organization = "unrc"
  bucket = "lora_bucket"
