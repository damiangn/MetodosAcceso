services:
  # Base de datos
  influxdb:
    image: influxdb:latest
    container_name: influxdb_unrc
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=unrc
      - DOCKER_INFLUXDB_INIT_BUCKET=lora_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mi-super-token-seguro-unrc
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # Agente de recolección de datos
  telegraf:
    image: telegraf:latest
    container_name: telegraf_unrc
    depends_on:
      - influxdb
      - mosquitto
    volumes:
      # Montamos el archivo de configuración que crearás abajo
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      - INFLUX_TOKEN=mi-super-token-seguro-unrc

  # Visualización
  grafana:
    image: grafana/grafana-oss
    container_name: grafana_unrc
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana

  # Broker MQTT (Opcional, para pruebas locales)
  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto_unrc
    ports:
      - "1883:1883"
      - "9001:9001"
    # Comando para permitir conexiones anónimas (facilidad de prueba)
    command: > 
      mosquitto -c /mosquitto-no-auth.conf 
      
    # Creamos una config al vuelo para permitir acceso anónimo en puerto 1883
    entrypoint: 
      - sh
      - -c
      - |
        echo "listener 1883" > /mosquitto-no-auth.conf
        echo "allow_anonymous true" >> /mosquitto-no-auth.conf
        /usr/sbin/mosquitto -c /mosquitto-no-auth.conf

volumes:
  influxdb_data:
  grafana_data:
